strategy_name: atr_trailing
strategy_version: v1
description: "ATR breakout strategy with trailing stop and hot-reloadable module."

module:
  path: src/strategies/builtin/atr.py
  factory_name: build_strategy
  reload_on_change: true

universe:
  exchange: binance
  market_type: spot
  symbols:
    - BTCUSDT
    - ETHUSDT
  interval: 1d

data:
  data_version: v1
  required_fields:
    - ts
    - symbol
    - interval
    - open
    - high
    - low
    - close
    - volume

signal:
  warmup_bars: 20
  atr_window: 14
  breakout_window: 20
  atr_multiplier: 3.0

execution:
  order_type: next_bar_open
  rebalance_frequency: daily
  slippage_bps: 5
  fee_bps: 10

risk:
  position_sizing: equal_weight_active
  max_position_per_symbol: 0.5
  max_total_exposure: 1.0
  max_active_positions: 2
  allow_partial_cash: true

backtest:
  engine: native
  initial_capital: 100000.0
  start_date: "2024-01-01"
  end_date: "2026-12-31"
  benchmark_symbol: BTCUSDT

artifacts:
  signal_path: data/signals/atr_trailing_v1/{symbol}_1d_signal.jsonl
  trades_path: data/backtests/atr_trailing_v1/trades.jsonl
  equity_path: data/backtests/atr_trailing_v1/portfolio_equity.jsonl
  summary_path: data/backtests/atr_trailing_v1/summary.json
